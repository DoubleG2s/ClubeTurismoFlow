<!-- Floating Action Button -->
<button 
  (click)="toggleChat()"
  [class.scale-0]="isOpen()"
  class="fixed bottom-6 right-6 z-[9999] w-14 h-14 bg-brand-600 hover:bg-brand-700 text-white rounded-full flex items-center justify-center shadow-lg hover:shadow-xl hover:-translate-y-1 transition-all duration-300 group focus:outline-none focus:ring-4 focus:ring-brand-500/30"
  aria-label="Abrir assistente virtual">
  
  <!-- Ícone Atendente/IA (linha do ícone para facilitar troca futura) -->
  <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 group-hover:scale-110 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
    <path stroke-linecap="round" stroke-linejoin="round" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
  </svg>
</button>

<!-- Chat Window Panel -->
<div 
  [class.translate-y-full]="!isOpen()"
  [class.opacity-0]="!isOpen()"
  [class.pointer-events-none]="!isOpen()"
  class="fixed bottom-6 right-6 sm:bottom-8 sm:right-8 z-[10000] w-[calc(100vw-32px)] sm:w-[380px] h-[500px] max-h-[calc(100vh-64px)] bg-white rounded-2xl shadow-2xl flex flex-col overflow-hidden border border-slate-200 transition-all duration-300 origin-bottom-right transform">
  
  <!-- Header -->
  <div class="bg-gradient-to-r from-brand-600 to-brand-700 p-4 flex items-center justify-between shrink-0 shadow-md z-10">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center backdrop-blur-sm">
        <!-- Ícone Atendente Header -->
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
        </svg>
      </div>
      <div>
        <h3 class="text-white font-bold text-sm tracking-wide">Assistente Clube Turismo</h3>
        <p class="text-brand-100/80 text-xs font-medium flex items-center gap-1">
          <span class="w-1.5 h-1.5 bg-amber-400 rounded-full animate-pulse"></span>
          Online
        </p>
      </div>
    </div>
    <button (click)="closeChat()" class="text-white/70 hover:text-white hover:bg-white/10 p-1.5 rounded-lg transition-colors focus:outline-none">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
  </div>

  <!-- Messages Area -->
  <div #scrollMe class="flex-1 overflow-y-auto p-4 bg-slate-50/50 flex flex-col gap-4 scroll-smooth">
    @for (msg of messages(); track msg.id) {
      <div 
        class="flex flex-col max-w-[85%] animate-fade-in"
        [ngClass]="msg.sender === 'user' ? 'self-end' : 'self-start'">
        
        <div 
          class="px-4 py-2.5 rounded-2xl text-sm"
          [ngClass]="msg.sender === 'user' ? 
            'bg-brand-600 text-white rounded-tr-none shadow-sm' : 
            'bg-white text-slate-700 rounded-tl-none border border-slate-200 shadow-sm'">
          {{msg.text}}
        </div>
        <span class="text-[10px] text-slate-400 mt-1 px-1 font-medium" [ngClass]="msg.sender === 'user' ? 'text-right' : 'text-left'">
          {{msg.timestamp | date:'HH:mm'}}
        </span>
      </div>
    }
  </div>

  <!-- Intput Area -->
  <div class="p-3 bg-white border-t border-slate-100 shrink-0">
    <div class="relative flex items-center">
      <textarea 
        [ngModel]="inputText()"
        (ngModelChange)="inputText.set($event)"
        (keydown)="handleKeyDown($event)"
        placeholder="Digite sua mensagem..."
        class="w-full bg-slate-50 border border-slate-200 text-slate-700 text-sm rounded-xl pl-4 pr-12 py-3 resize-none focus:outline-none focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 transition-all max-h-24 min-h-[44px]"
        rows="1">
      </textarea>
      <button 
        (click)="sendMessage()"
        [disabled]="!inputText().trim()"
        class="absolute right-2 p-1.5 text-brand-600 hover:bg-brand-50 rounded-lg transition-colors disabled:opacity-40 disabled:hover:bg-transparent flex items-center justify-center">
        <!-- Ícone Sent/Enviar -->
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 transform -rotate-90" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="19" x2="12" y2="5"></line>
          <polyline points="5 12 12 5 19 12"></polyline>
        </svg>
      </button>
    </div>
    <div class="text-center mt-2 flex items-center justify-center gap-1.5">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
      </svg>
      <span class="text-[10px] font-medium text-slate-400">IA mockada para simulação</span>
    </div>
  </div>
</div>
