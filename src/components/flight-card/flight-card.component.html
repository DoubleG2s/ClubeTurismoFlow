<div 
  class="relative h-full rounded-2xl transition-all duration-300 ease-in-out hover:-translate-y-1 hover:shadow-xl group overflow-hidden flex flex-col"
  [class]="flight.confirmed 
    ? 'bg-gradient-to-br from-blue-500 to-blue-600 text-white shadow-lg shadow-blue-500/25 border-transparent' 
    : 'bg-white border border-slate-200 text-slate-900 shadow-sm'"
>

  <!-- Watermark Icon (Absolute) -->
  <div 
    class="absolute -bottom-6 -right-6 pointer-events-none transition-transform duration-500 group-hover:scale-110 rotate-[-15deg]"
    [class]="flight.confirmed ? 'opacity-25' : 'opacity-10'"
  >
    <svg xmlns="http://www.w3.org/2000/svg" class="w-40 h-40" 
         [class]="flight.confirmed ? 'text-white' : 'text-slate-400'"
         viewBox="0 0 24 24" fill="currentColor">
      <path d="M21 16v-2l-8-5V3.5A1.5 1.5 0 0 0 11.5 2 1.5 1.5 0 0 0 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/>
    </svg>
  </div>

  <div class="relative z-10 flex flex-col h-full p-6">
    
    <!-- Top Row: Locator & Status -->
    <div class="flex justify-between items-start mb-6">
      <div>
        <p class="text-[10px] uppercase tracking-widest font-bold opacity-80 mb-1">Localizador</p>
        <h3 class="text-3xl font-bold tracking-tight font-mono">{{ flight.locator }}</h3>
      </div>
      
      <div 
        class="px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wide border shadow-sm backdrop-blur-md"
        [class]="flight.confirmed 
          ? 'bg-white/20 text-white border-white/30' 
          : 'bg-slate-100 text-slate-500 border-slate-200'"
      >
        {{ flight.confirmed ? 'Confirmado' : 'Pendente' }}
      </div>
    </div>

    <!-- Flight Details -->
    <div class="space-y-4 mb-6 flex-grow">
      <div>
        <div class="flex items-center gap-1 mb-1 opacity-80">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
          <p class="text-xs font-semibold uppercase tracking-wide">Origem</p>
        </div>
        <p class="text-lg font-bold truncate">{{ flight.origin || 'A Definir' }}</p>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <div class="flex items-center gap-1 mb-1 opacity-80">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            <p class="text-xs font-semibold uppercase tracking-wide">Ida</p>
          </div>
          <p class="text-lg font-bold">{{ flight.date }}</p>
        </div>
        <div>
          <div class="flex items-center gap-1 mb-1 opacity-80">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
            <p class="text-xs font-semibold uppercase tracking-wide">Volta</p>
          </div>
          <p class="text-lg font-bold">{{ flight.return_date || '--' }}</p>
        </div>
      </div>
    </div>

    <!-- Footer: Actions & Toggle -->
    <div class="mt-auto pt-4 border-t" [class]="flight.confirmed ? 'border-white/20' : 'border-slate-100'">
      
      <!-- Author info (Discrete) -->
      @if (flight.author_name) {
        <div class="mb-4 text-[10px] font-medium opacity-60 flex items-center gap-1.5">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          Cadastrado por: {{ flight.author_name }}
        </div>
      }

      <!-- Toggle Switch -->
      <div class="flex items-center justify-between mb-5">
        <label class="flex items-center gap-3 cursor-pointer group/check select-none">
          <div class="relative">
            <input 
              type="checkbox" 
              [checked]="flight.confirmed" 
              (change)="onCheckboxChange($event)"
              class="sr-only peer"
            >
            <div 
              class="w-10 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer 
                     peer-checked:bg-white/30 peer-checked:border peer-checked:border-white/40
                     transition-all duration-300 ease-in-out"
            ></div>
            <div 
              class="absolute top-[2px] left-[2px] bg-white border border-slate-300 rounded-full h-5 w-5 transition-all duration-300 peer-checked:translate-x-full peer-checked:border-transparent flex items-center justify-center shadow-sm"
              [class]="flight.confirmed ? 'bg-blue-600 text-blue-600' : ''"
            >
              <svg *ngIf="flight.confirmed" class="w-3 h-3 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                 <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
              </svg>
            </div>
          </div>
          <span class="text-xs font-medium opacity-80 group-hover/check:opacity-100 transition-opacity">
            No App Azul?
          </span>
        </label>
      </div>

      <!-- Action Buttons -->
      <div class="flex gap-3">
        <button 
          type="button"
          (click)="edit.emit(flight.id)"
          class="flex-1 py-2 px-3 rounded-lg text-xs font-bold uppercase tracking-wider transition-all duration-200 border flex items-center justify-center gap-2"
          [class]="flight.confirmed 
            ? 'bg-white/10 border-white/20 text-white hover:bg-white/20' 
            : 'bg-white border-slate-200 text-slate-600 hover:bg-slate-50 hover:border-brand-300 hover:text-brand-600'"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>
          Editar
        </button>
        
        <button 
          type="button"
          (click)="remove.emit(flight.id)"
          class="p-2 rounded-lg transition-all duration-200 border flex items-center justify-center"
          [class]="flight.confirmed 
            ? 'bg-white/10 border-white/20 text-white hover:bg-red-500/20 hover:border-red-400/50' 
            : 'bg-white border-slate-200 text-slate-400 hover:bg-red-50 hover:border-red-200 hover:text-red-600'"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>
