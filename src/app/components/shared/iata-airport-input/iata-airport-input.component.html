<div class="relative">
  <input
    type="text"
    [value]="value"
    [placeholder]="placeholder"
    [class]="cssClass"
    (input)="onInput($event)"
    (blur)="onBlur()"
    autocomplete="off"
    style="padding-right: 1.75rem;"
  >

  @if (lookupState() === 'loading') {
  <div class="absolute right-2 top-1/2 -translate-y-1/2 pointer-events-none">
    <svg class="animate-spin h-3.5 w-3.5 text-blue-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
    </svg>
  </div>
  }

  @if (lookupState() === 'found') {
  <div class="absolute right-2 top-1/2 -translate-y-1/2 pointer-events-none">
    <svg class="h-3.5 w-3.5 text-emerald-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20 6 9 17 4 12"></polyline>
    </svg>
  </div>
  }

  @if (lookupState() === 'not_found' || lookupState() === 'error') {
  <p class="absolute left-0 top-full mt-0.5 text-[10px] font-bold text-red-500 whitespace-nowrap z-10">
    {{ lookupState() === 'not_found' ? 'Aeroporto não encontrado' : 'Erro ao buscar aeroporto' }}
  </p>
  }
</div>
