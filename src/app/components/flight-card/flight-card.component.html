<div class="relative rounded-2xl transition-all duration-200 ease-in-out hover:-translate-y-1 group overflow-hidden flex flex-col"
  [ngClass]="flight.confirmed
    ? 'bg-gradient-to-br from-info-500 to-info-700 text-white border-transparent shadow-lg'
    : 'bg-white border text-slate-900 shadow-sh-1'"
  [style.border-color]="!flight.confirmed ? 'var(--n-150)' : 'transparent'">

  <!-- Watermark -->
  <div class="absolute -bottom-6 -right-6 pointer-events-none transition-transform duration-500 group-hover:scale-110 -rotate-[15deg]"
    [style.opacity]="flight.confirmed ? '0.2' : '0.07'">
    <svg xmlns="http://www.w3.org/2000/svg" class="w-40 h-40" [class]="flight.confirmed ? 'text-white' : 'text-n-400'" viewBox="0 0 24 24" fill="currentColor">
      <path d="M21 16v-2l-8-5V3.5A1.5 1.5 0 0 0 11.5 2 1.5 1.5 0 0 0 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/>
    </svg>
  </div>

  <div class="relative z-10 flex flex-col h-full p-5">

    <!-- Top Row -->
    <div class="flex justify-between items-start mb-5">
      <div>
        <p class="text-[10px] uppercase tracking-widest font-bold mb-1" [style.opacity]="'.7'">Localizador</p>
        <h3 class="text-3xl font-bold tracking-tight font-mono">{{ flight.locator }}</h3>
      </div>
      <div class="px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wide border backdrop-blur-md"
        [class]="flight.confirmed
          ? 'bg-white/20 text-white border-white/30'
          : 'bg-n-100 text-n-500 border-n-200'">
        {{ flight.confirmed ? 'Confirmado' : 'Pendente' }}
      </div>
    </div>

    <!-- Details -->
    <div class="space-y-4 mb-5 flex-grow">
      <div>
        <div class="flex items-center gap-1 mb-1 opacity-70">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
          <p class="text-xs font-semibold uppercase tracking-wide">Origem</p>
        </div>
        <p class="text-base font-bold truncate">{{ flight.origin || 'A Definir' }}</p>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <div class="flex items-center gap-1 mb-1 opacity-70">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            <p class="text-xs font-semibold uppercase tracking-wide">Ida</p>
          </div>
          <p class="text-base font-bold">{{ flight.date }}</p>
        </div>
        <div>
          <div class="flex items-center gap-1 mb-1 opacity-70">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
            <p class="text-xs font-semibold uppercase tracking-wide">Volta</p>
          </div>
          <p class="text-base font-bold">{{ flight.return_date || '--' }}</p>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="mt-auto pt-3" [style.border-top]="flight.confirmed ? '1px solid rgba(255,255,255,.15)' : '1px solid var(--n-100)'">

      @if (flight.author_name) {
        <div class="mb-3 text-[10px] font-medium opacity-60 flex items-center gap-1.5">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          Cadastrado por: {{ flight.author_name }}
        </div>
      }

      <!-- Toggle -->
      <div class="flex items-center justify-between mb-4">
        <label class="flex items-center gap-3 cursor-pointer select-none">
          <div class="relative">
            <input type="checkbox" [checked]="flight.confirmed" (change)="onCheckboxChange($event)" class="sr-only peer">
            <div class="w-10 h-6 rounded-full peer transition-all duration-300"
              [style.background]="flight.confirmed ? 'rgba(255,255,255,.25)' : 'var(--n-200)'"
              [style.border]="flight.confirmed ? '1px solid rgba(255,255,255,.3)' : 'none'"></div>
            <div class="absolute top-[2px] left-[2px] rounded-full h-5 w-5 transition-all duration-300 peer-checked:translate-x-full shadow-sm flex items-center justify-center"
              [class]="flight.confirmed ? 'bg-white' : 'bg-white border border-n-200'">
              @if (flight.confirmed) {
                <svg class="w-3 h-3" style="color: var(--info-500);" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
                </svg>
              }
            </div>
          </div>
          <span class="text-xs font-medium opacity-80">No App Azul?</span>
        </label>
      </div>

      <!-- Buttons -->
      <div class="flex gap-2">
        <button type="button" (click)="edit.emit(flight.id)"
          class="flex-1 py-2 px-3 rounded-lg text-xs font-bold uppercase tracking-wider transition-all duration-200 border flex items-center justify-center gap-2"
          [class]="flight.confirmed
            ? 'bg-white/15 border-white/25 text-white hover:bg-white/25'
            : 'bg-white border-n-200 text-n-600 hover:bg-n-50 hover:border-brand-300 hover:text-brand-600'">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>
          Editar
        </button>
        <button type="button" (click)="remove.emit(flight.id)"
          class="p-2 rounded-lg transition-all duration-200 border flex items-center justify-center"
          [class]="flight.confirmed
            ? 'bg-white/15 border-white/25 text-white hover:bg-red-500/25'
            : 'bg-white border-n-200 text-n-400 hover:bg-danger-50 hover:border-danger-200 hover:text-danger-500'">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>
