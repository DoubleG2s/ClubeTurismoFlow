<!-- FAB Button -->
<button (click)="toggleChat()" [class.scale-0]="isOpen()"
  class="fixed bottom-6 right-6 z-[9999] w-14 h-14 text-white rounded-full flex items-center justify-center shadow-lg hover:shadow-xl hover:-translate-y-1 transition-all duration-300 group focus:outline-none"
  style="background: var(--ai-500);"
  aria-label="Abrir assistente virtual">
  <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 group-hover:scale-110 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
    <path stroke-linecap="round" stroke-linejoin="round" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/>
  </svg>
</button>

<!-- Chat Window -->
<div [class.translate-y-full]="!isOpen()" [class.opacity-0]="!isOpen()" [class.pointer-events-none]="!isOpen()"
  class="fixed bottom-6 right-6 sm:bottom-8 sm:right-8 z-[10000] w-[calc(100vw-32px)] sm:w-[380px] h-[500px] max-h-[calc(100vh-64px)] rounded-2xl flex flex-col overflow-hidden transition-all duration-300 origin-bottom-right transform"
  style="background: var(--n-0); box-shadow: var(--sh-pop); border: var(--border);">

  <!-- Header -->
  <div class="p-4 flex items-center justify-between flex-shrink-0 shadow-sm z-10" style="background: linear-gradient(135deg, var(--ai-700), var(--ai-500));">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 rounded-full flex items-center justify-center" style="background: rgba(255,255,255,.15);">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
        </svg>
      </div>
      <div>
        <h3 class="text-white font-bold text-sm">Assistente Clube Turismo</h3>
        <p class="text-white/70 text-xs font-medium flex items-center gap-1">
          <span class="w-1.5 h-1.5 bg-amber-400 rounded-full animate-pulse"></span>
          Online
        </p>
      </div>
    </div>
    <button (click)="closeChat()" class="text-white/70 hover:text-white hover:bg-white/10 p-1.5 rounded-lg transition-colors focus:outline-none">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
  </div>

  <!-- Messages -->
  <div #scrollMe class="flex-1 overflow-y-auto p-4 flex flex-col gap-3 scroll-smooth" style="background: var(--n-25);">
    @for (msg of messages(); track msg.id) {
      <div class="flex flex-col max-w-[85%] animate-fade-in"
        [ngClass]="msg.sender === 'user' ? 'self-end' : 'self-start'">
        <div class="px-3.5 py-2.5 rounded-2xl text-sm whitespace-pre-wrap"
          [ngClass]="msg.sender === 'user' ? 'rounded-tr-none text-white' : 'rounded-tl-none'"
          [style.background]="msg.sender === 'user' ? 'var(--ai-500)' : 'var(--n-0)'"
          [style.color]="msg.sender === 'user' ? '#fff' : 'var(--n-700)'"
          [style.border]="msg.sender !== 'user' ? '1px solid var(--n-150)' : 'none'"
          [style.box-shadow]="msg.sender !== 'user' ? 'var(--sh-1)' : 'none'">
          {{ msg.text }}
        </div>
        <span class="text-[10px] mt-1 px-1 font-medium" style="color: var(--n-400);"
          [ngClass]="msg.sender === 'user' ? 'text-right' : 'text-left'">
          {{ msg.timestamp | date:'HH:mm' }}
        </span>
      </div>
    }

    @if (isLoading()) {
      <div class="flex self-start max-w-[85%] animate-fade-in">
        <div class="px-4 py-3 rounded-2xl rounded-tl-none flex items-center space-x-2"
          style="background: var(--n-0); border: 1px solid var(--n-150); box-shadow: var(--sh-1);">
          <div class="w-1.5 h-1.5 rounded-full animate-bounce" style="background: var(--ai-500); animation-delay:-0.3s"></div>
          <div class="w-1.5 h-1.5 rounded-full animate-bounce" style="background: var(--ai-500); animation-delay:-0.15s"></div>
          <div class="w-1.5 h-1.5 rounded-full animate-bounce" style="background: var(--ai-500);"></div>
          <span class="ml-2 text-xs italic" style="color: var(--n-500);">Pensando...</span>
        </div>
      </div>
    }
  </div>

  <!-- Input Area -->
  <div class="p-3 flex-shrink-0 relative" style="background: var(--n-0); border-top: var(--border);">

    @if (selectedFile()) {
      <div class="absolute -top-10 left-3 flex items-center gap-2 text-white px-3 py-1.5 rounded-lg text-xs font-medium shadow-md z-10 animate-fade-in"
        style="background: var(--n-800);">
        <svg class="w-3.5 h-3.5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/>
        </svg>
        <span class="truncate max-w-[150px]">{{ selectedFile()?.name }}</span>
        <button (click)="removeFile()" class="p-0.5 rounded-full transition-colors ml-1 hover:bg-white/20" title="Remover PDF">
          <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
        </button>
      </div>
    }

    <div class="relative flex items-center">
      <input type="file" #fileInput accept="application/pdf" class="hidden" (change)="onFileSelected($event)">

      <button [disabled]="isLoading()" (click)="fileInput.click()"
        class="ct-icon-btn absolute left-1 disabled:opacity-50" title="Anexar Voucher (PDF)">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/>
        </svg>
      </button>

      <textarea [ngModel]="inputText()" (ngModelChange)="inputText.set($event)" (keydown)="handleKeyDown($event)"
        placeholder="Digite sua mensagem..." [disabled]="isLoading()"
        class="ct-textarea resize-none pl-9 pr-10 py-2.5 disabled:opacity-60 max-h-24 min-h-[44px]"
        rows="1">
      </textarea>

      <button (click)="sendMessage()" [disabled]="isLoading() || (!inputText().trim() && !selectedFile())"
        class="ct-icon-btn absolute right-1 disabled:opacity-40" style="color: var(--ai-500);">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 transform -rotate-90" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline>
        </svg>
      </button>
    </div>

    <div class="text-center mt-2 flex items-center justify-center gap-1.5">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" style="color: var(--n-300);" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
      </svg>
      <span class="text-[10px] font-medium" style="color: var(--n-400);">Assistente Integrado IA ClubeFlow</span>
    </div>
  </div>
</div>
