<div class="min-h-screen flex items-center justify-center px-4" style="background: var(--n-50);">
  <div class="max-w-md w-full rounded-2xl p-8" style="background: var(--n-0); box-shadow: var(--sh-pop); border: var(--border);">

    <!-- Header -->
    <div class="text-center mb-8">
      <div class="w-16 h-16 rounded-2xl flex items-center justify-center text-white mx-auto mb-4" style="background: linear-gradient(135deg, var(--brand-500), var(--brand-700)); box-shadow: 0 8px 24px rgba(20,160,122,.3);">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
        </svg>
      </div>
      <h2 class="text-2xl font-bold" style="color: var(--n-900); letter-spacing: -0.02em;">Bem-vindo</h2>
      <p class="mt-2 text-sm" style="color: var(--n-500);">Faça login para acessar o sistema</p>
    </div>

    @if (errorMessage()) {
      <div class="px-4 py-3 rounded-xl mb-6 text-sm flex items-start gap-2 animate-fade-in"
        style="background: var(--danger-50); border: 1px solid #f0caca; color: var(--danger-700);">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 flex-shrink-0 mt-0.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span>{{ errorMessage() }}</span>
      </div>
    }

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-5">
      <div class="ct-field">
        <label class="ct-label">E-mail</label>
        <input type="email" formControlName="email" class="ct-input" placeholder="seu@email.com">
      </div>

      <div class="ct-field">
        <label class="ct-label">Senha</label>
        <input type="password" formControlName="password" class="ct-input" placeholder="••••••••">
      </div>

      <button type="submit" [disabled]="loginForm.invalid || isLoading()"
        class="w-full py-3 rounded-xl font-bold text-white transition-all active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed flex justify-center items-center"
        style="background: linear-gradient(135deg, var(--brand-600), var(--brand-500)); box-shadow: 0 4px 14px rgba(20,160,122,.3);">
        @if (isLoading()) {
          <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
        } @else {
          Entrar
        }
      </button>
    </form>

    <p class="text-center text-xs mt-8" style="color: var(--n-400);">
      Acesso restrito a colaboradores autorizados.
    </p>
  </div>
</div>
