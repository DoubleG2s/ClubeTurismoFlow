<div class="animate-fade-in space-y-8">
  <section>
    <div class="flex items-center gap-3 mb-5 pl-1">
      <h2 class="text-lg font-bold text-slate-700 uppercase tracking-wider flex items-center gap-2">
        <span class="w-1.5 h-6 bg-brand-500 rounded-full inline-block"></span>
        Novo Agendamento
      </h2>
    </div>
    <app-flight-form (save)="addFlight.emit($event)" [prefillData]="prefilledFlightData"></app-flight-form>
  </section>

  <section>
    <div class="flex items-center justify-between mb-6 pl-1">
      <h2 class="text-lg font-bold text-slate-700 uppercase tracking-wider flex items-center gap-2">
        <span class="w-1.5 h-6 bg-indigo-500 rounded-full inline-block"></span>
        Voos Cadastrados
        <span class="text-sm font-medium normal-case bg-slate-200 text-slate-600 px-2 py-0.5 rounded-full ml-2">{{ flights.length }}</span>
      </h2>
    </div>

    @if (flights.length > 0) {
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
      @for (flight of flights; track flight.id) {
      <app-flight-card
        [flight]="flight"
        (edit)="editFlight.emit($event)"
        (remove)="removeFlight.emit($event)"
        (toggleConfirm)="toggleConfirm.emit($event)"></app-flight-card>
      }
    </div>
    } @else {
    <div
      class="flex flex-col items-center justify-center py-20 bg-white rounded-2xl border border-dashed border-slate-300 text-center shadow-sm">
      <div class="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center mb-4">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-slate-400" fill="none" viewBox="0 0 24 24"
          stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
        </svg>
      </div>
      <h3 class="text-base font-semibold text-slate-900">Nenhum voo cadastrado</h3>
      <p class="mt-1 text-sm text-slate-500 max-w-xs">Utilize o formulário acima para adicionar o primeiro voo.</p>
    </div>
    }
  </section>
</div>
