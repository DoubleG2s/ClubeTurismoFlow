<div class="animate-fade-in">
  <div class="ct-page-body space-y-8">

    <section>
      <div class="ct-sec-toggle" [class.mb-3]="formOpen" [class.open]="formOpen" (click)="formOpen = !formOpen">
        <span class="sec-bar sec-bar-info"></span>
        <h2>Novo Agendamento</h2>
        <svg class="toggle-chevron w-4 h-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="ct-collapse" [class.open]="formOpen">
        <div>
          <div class="pb-1">
            <app-flight-form (save)="addFlight.emit($event)" [prefillData]="prefilledFlightData"></app-flight-form>
          </div>
        </div>
      </div>
    </section>

    <section>
      <div class="ct-sec-head mb-6">
        <span class="sec-bar sec-bar-info-muted"></span>
        <h2>
          Voos Cadastrados
          <span class="ct-sec-count">{{ flights.length }}</span>
        </h2>
      </div>

      @if (flights.length > 0) {
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
          @for (flight of flights; track flight.id) {
            <app-flight-card [flight]="flight" (edit)="editFlight.emit($event)" (remove)="removeFlight.emit($event)" (toggleConfirm)="toggleConfirm.emit($event)"></app-flight-card>
          }
        </div>
      } @else {
        <div class="flex flex-col items-center justify-center py-20 rounded-2xl border border-dashed text-center" style="background: var(--n-0); border-color: var(--n-200);">
          <div class="w-14 h-14 rounded-full flex items-center justify-center mb-4" style="background: var(--n-50);">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" style="color: var(--n-300);" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
            </svg>
          </div>
          <h3 class="text-sm font-semibold" style="color: var(--n-900);">Nenhum voo cadastrado</h3>
          <p class="mt-1 text-sm max-w-xs" style="color: var(--n-500);">Utilize o formulário acima para adicionar o primeiro voo.</p>
        </div>
      }
    </section>

  </div>
</div>
