<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clube Turismo Flow</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            brand: {
              50: '#eff6ff',
              100: '#dbeafe',
              500: '#3b82f6',
              600: '#2563eb',
              700: '#1d4ed8',
            }
          }
        },
      },
    }
  </script>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f3f4f6;
    }

    /* Custom scrollbar for better look */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #f1f1f1;
    }

    ::-webkit-scrollbar-thumb {
      background: #c1c1c1;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #a8a8a8;
    }

    /* Quote Proposal Animations */
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes toastSlideUp {
      0% { opacity: 0; transform: translate(-50%, 20px); }
      10% { opacity: 1; transform: translate(-50%, 0); }
      85% { opacity: 1; transform: translate(-50%, 0); }
      100% { opacity: 0; transform: translate(-50%, -8px); }
    }
    @keyframes pulseRing {
      0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); }
      70% { box-shadow: 0 0 0 8px rgba(59, 130, 246, 0); }
      100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
    }
    .qp-slide-up { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both; }
    .qp-slide-up-d1 { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.08s both; }
    .qp-slide-up-d2 { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.16s both; }
    .qp-slide-up-d3 { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.24s both; }
    .qp-slide-up-d4 { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.32s both; }
    .qp-fade-in { animation: fadeIn 0.4s ease-out both; }
    .qp-toast { animation: toastSlideUp 4s cubic-bezier(0.16, 1, 0.3, 1) both; }
    .qp-pulse-ring { animation: pulseRing 1.5s ease-out; }

    .qp-accordion {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .qp-accordion.is-open {
      grid-template-rows: 1fr;
    }
    .qp-accordion > div {
      overflow: hidden;
    }

    /* Hotel card interactive states */
    .qp-hotel-card {
      transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.25s ease;
    }
    .qp-hotel-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.08);
    }
    .qp-hotel-card:active {
      transform: scale(0.995);
    }

    /* Service card hover */
    .qp-service-card {
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .qp-service-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
    }

    /* City Autocomplete Dropdown */
    @keyframes cityAcSlideDown {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .city-ac-enter {
      animation: cityAcSlideDown 0.15s ease-out both;
    }
    .city-ac-enter .max-h-60::-webkit-scrollbar { width: 4px; }
    .city-ac-enter .max-h-60::-webkit-scrollbar-thumb {
      background: #cbd5e1; border-radius: 4px;
    }

    /* Print styles for proposal */
    @media print {
      .qp-hotel-card:hover,
      .qp-service-card:hover { transform: none; box-shadow: none; }
      .qp-slide-up, .qp-slide-up-d1, .qp-slide-up-d2, .qp-slide-up-d3, .qp-slide-up-d4 {
        animation: none !important; opacity: 1 !important;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .qp-slide-up, .qp-slide-up-d1, .qp-slide-up-d2, .qp-slide-up-d3, .qp-slide-up-d4,
      .qp-fade-in, .qp-toast, .qp-pulse-ring {
        animation: none !important; opacity: 1 !important;
      }
      .qp-hotel-card, .qp-service-card, .qp-accordion {
        transition: none !important;
      }
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "rxjs": "https://esm.sh/rxjs@^7.8.2?conditions=es2015",
    "rxjs/operators": "https://esm.sh/rxjs@^7.8.2/operators?conditions=es2015",
    "rxjs/ajax": "https://esm.sh/rxjs@^7.8.2/ajax?conditions=es2015",
    "rxjs/webSocket": "https://esm.sh/rxjs@^7.8.2/webSocket?conditions=es2015",
    "rxjs/testing": "https://esm.sh/rxjs@^7.8.2/testing?conditions=es2015",
    "rxjs/fetch": "https://esm.sh/rxjs@^7.8.2/fetch?conditions=es2015",
    "@angular/forms": "https://next.esm.sh/@angular/forms@^21.0.6?external=rxjs",
    "@angular/compiler": "https://next.esm.sh/@angular/compiler@^21.0.6?external=rxjs",
    "@angular/common": "https://next.esm.sh/@angular/common@^21.0.6?external=rxjs",
    "@angular/platform-browser": "https://next.esm.sh/@angular/platform-browser@^21.0.6?external=rxjs",
    "@angular/core": "https://next.esm.sh/@angular/core@^21.0.6?external=rxjs",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2"
  }
}
</script>
</head>

<body>
  <app-root></app-root>
</body>

</html>
